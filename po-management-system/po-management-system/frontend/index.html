<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PO Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
</head>
<body class="container mt-5">
    <h2>Purchase Orders Dashboard</h2>
    <a href="create-po.html" class="btn btn-primary mb-3">+ Create New PO</a>
    
    <table class="table table-striped" id="poTable">
        <thead class="table-dark">
            <tr><th>Reference No</th><th>Total (incl. 5% tax)</th><th>Status</th></tr>
        </thead>
        <tbody></tbody>
    </table>

<script>
async function loadPOs() {
    const pos = await fetch('http://127.0.0.1:8000/purchase-orders').then(r => r.json());
    let html = "";
    pos.forEach(po => {
        html += `<tr>
            <td>${po.reference_no}</td>
            <td>₹${po.total_amount}</td>
            <td><span class="badge bg-success">${po.status}</span></td>
        </tr>`;
    });
    $("#poTable tbody").html(html);
}
$(document).ready(loadPOs);
</script>
</body>
</html>
