<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PO Dashboard - Manage Products & Vendors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
</head>
<body class="container mt-5">
    <h2>Dashboard</h2>
    <a href="create-po.html" class="btn btn-primary mb-4">+ Create New PO</a>

    <h4>Products</h4>
    <table class="table table-striped" id="productsTable">
        <thead class="table-dark"><tr><th>Name</th><th>Price</th><th>Action</th></tr></thead>
        <tbody></tbody>
    </table>

    <h4 class="mt-5">Vendors</h4>
    <table class="table table-striped" id="vendorsTable">
        <thead class="table-dark"><tr><th>Name</th><th>Action</th></tr></thead>
        <tbody></tbody>
    </table>

<script>
async function loadData() {
    // Products
    const products = await fetch('http://127.0.0.1:8000/products').then(r => r.json());
    let html = "";
    products.forEach(p => {
        html += `<tr>
            <td>${p.name}</td>
            <td>₹${p.unit_price}</td>
            <td><button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">Delete</button></td>
        </tr>`;
    });
    $("#productsTable tbody").html(html);

    // Vendors
    const vendors = await fetch('http://127.0.0.1:8000/vendors').then(r => r.json());
    html = "";
    vendors.forEach(v => {
        html += `<tr>
            <td>${v.name}</td>
            <td><button class="btn btn-danger btn-sm" onclick="deleteVendor(${v.id})">Delete</button></td>
        </tr>`;
    });
    $("#vendorsTable tbody").html(html);
}

async function deleteProduct(id) {
    if (!confirm("Delete this product?")) return;
    await fetch(`http://127.0.0.1:8000/products/${id}`, {method: "DELETE"});
    alert("Product deleted!");
    loadData();
}

async function deleteVendor(id) {
    if (!confirm("Delete this vendor?")) return;
    await fetch(`http://127.0.0.1:8000/vendors/${id}`, {method: "DELETE"});
    alert("Vendor deleted!");
    loadData();
}

$(document).ready(loadData);
</script>
</body>
</html>
