<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create New Purchase Order</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <style> body { padding: 30px; } .line-total { font-weight: bold; } </style>
</head>
<body>
<div class="container">
    <h2 class="mb-4">Create New Purchase Order</h2>
    
    <div class="mb-3">
        <label class="form-label">Vendor</label>
        <select id="vendorSelect" class="form-select"></select>
    </div>

    <table id="itemsTable" class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Product</th>
                <th>Qty</th>
                <th>Unit Price</th>
                <th>Line Total</th>
                <th>AI Description</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <button class="btn btn-success mb-3" onclick="addRow()">+ Add Product Row</button>
    <button class="btn btn-primary float-end" onclick="submitPO()">Submit Purchase Order</button>
</div>

<script>
let rowId = 0;
let allProducts = [];

async function loadData() {
    const vendors = await fetch('http://127.0.0.1:8000/vendors').then(r => r.json());
    vendors.forEach(v => $("#vendorSelect").append(`<option value="${v.id}">${v.name}</option>`));

    allProducts = await fetch('http://127.0.0.1:8000/products').then(r => r.json());
}

function addRow() {
    rowId++;
    const row = `
        <tr id="row${rowId}">
            <td><select class="form-select product-select" onchange="updatePrice(this)"></select></td>
            <td><input type="number" class="form-control qty" value="1" min="1" onchange="calculateLine(this)"></td>
            <td class="price text-end">0</td>
            <td class="line-total text-end fw-bold">0</td>
            <td><button class="btn btn-info btn-sm" onclick="autoDescription(this)">AI Desc</button></td>
            <td><button class="btn btn-danger btn-sm" onclick="deleteRow(this)">×</button></td>
        </tr>`;
    $("#itemsTable tbody").append(row);

    allProducts.forEach(p => {
        $(`#row${rowId} .product-select`).append(`<option value="${p.id}" data-price="${p.unit_price}">${p.name}</option>`);
    });
}

function updatePrice(select) {
    const price = $(select).find(":selected").data("price") || 0;
    $(select).closest("tr").find(".price").text(price);
    calculateLine(select);
}

function calculateLine(el) {
    const tr = $(el).closest("tr");
    const price = parseFloat(tr.find(".price").text()) || 0;
    const qty = parseFloat(tr.find(".qty").val()) || 0;
    const line = (price * qty).toFixed(2);
    tr.find(".line-total").text(line);
}

async function autoDescription(btn) {
    const productName = $(btn).closest("tr").find("select option:selected").text();
    const desc = await fetch(`http://127.0.0.1:8000/generate-desc?name=${encodeURIComponent(productName)}`)
                     .then(r => r.json())
                     .then(data => data.description);
    alert("AI Marketing Description:\n\n" + desc);
}

async function submitPO() {
    const vendorId = $("#vendorSelect").val();
    const items = [];
    
    $("#itemsTable tbody tr").each(function() {
        const productId = $(this).find(".product-select").val();
        const qty = parseInt($(this).find(".qty").val());
        if (productId && qty) items.push({product_id: parseInt(productId), quantity: qty});
    });

    const res = await fetch("http://127.0.0.1:8000/purchase-orders/", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({vendor_id: parseInt(vendorId), items: items})
    });

    const data = await res.json();
    alert(`✅ Purchase Order Created!\nReference: ${data.reference_no}\nTotal (with 5% tax): ₹${data.total_amount}`);
}

$(document).ready(() => loadData());
</script>
</body>
</html>
